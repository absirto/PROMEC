services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - '127.0.0.1:3001:3001'
    volumes:
      - uploads_data:/app/uploads

  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: promec_db
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d promec_db']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
  uploads_data: